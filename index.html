<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Casos Peya</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }
  header { background: #ff6900; color: white; padding: 16px 24px; }
  header h1 { font-size: 20px; font-weight: 700; }
  header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .nav { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px; }
  .nav button { font-size: 12px; padding: 6px 12px; border: 1.5px solid #ccc; border-radius: 20px; background: white; color: #444; cursor: pointer; transition: all 0.15s; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  .nav button:hover { border-color: #ff6900; color: #ff6900; }
  .nav button.active { background: #ff6900; color: white; border-color: #ff6900; font-weight: 600; }
  .edit-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .btn-edit-mode { font-size: 11px; padding: 5px 12px; border: 1.5px solid #aaa; border-radius: 20px; background: white; color: #555; cursor: pointer; transition: all 0.15s; }
  .btn-edit-mode:hover { border-color: #ff6900; color: #ff6900; }
  .btn-edit-mode.on { background: #fff3e0; border-color: #ff6900; color: #c2410c; font-weight: 700; }
  .edit-hint { font-size: 11px; color: #aaa; display: none; }
  .edit-hint.visible { display: inline; }
  .btn-reset-order { font-size: 11px; padding: 5px 12px; border: 1.5px solid #ddd; border-radius: 20px; background: white; color: #888; cursor: pointer; display: none; transition: all 0.15s; }
  .btn-reset-order.visible { display: inline-block; }
  .btn-reset-order:hover { border-color: #e11d48; color: #e11d48; }
  .btn-add-nav { font-size: 11px; padding: 5px 12px; border: 1.5px solid #10b981; border-radius: 20px; background: #f0fdf4; color: #065f46; cursor: pointer; transition: all 0.15s; font-weight: 600; }
  .btn-add-nav:hover { background: #d1fae5; border-color: #059669; }
  .nav.edit-mode button { cursor: grab; border-style: dashed; }
  .nav.edit-mode button:active { cursor: grabbing; }
  .nav button.dragging { opacity: 0.35; transform: scale(0.95); }
  .nav button.drag-over { border-color: #ff6900 !important; background: #fff3e0 !important; transform: scale(1.05); box-shadow: 0 0 0 2px #ff690044; }
  .section { display: none; }
  .nav button.nav-currier { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
  .nav button.nav-currier:hover { background: #dbeafe; border-color: #2563eb; }
  .nav button.nav-nocurrier { background: #ecfdf5; border-color: #86efac; color: #15803d; }
  .nav button.nav-nocurrier:hover { background: #dcfce7; border-color: #16a34a; }
  .nav button.nav-ambos { background: #fff7ed; border-color: #fdba74; color: #c2410c; }
  .nav button.nav-ambos:hover { background: #ffedd5; border-color: #ea580c; }
  .nav button.nav-b2c { background: #f5f3ff; border-color: #c4b5fd; color: #7c3aed; }
  .nav button.nav-b2c:hover { background: #ede9fe; border-color: #7c3aed; }
  .nav button.nav-custom { background: #fdf4ff; border-color: #d8b4fe; color: #7e22ce; }
  .nav button.nav-custom:hover { background: #f3e8ff; border-color: #a855f7; }
  .nav button.active { background: #ff6900 !important; color: white !important; border-color: #ff6900 !important; }
  .section.visible { display: block; }
  .section-title { font-size: 17px; font-weight: 700; color: #ff6900; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #ff6900; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 10px; margin-bottom: 12px; }
  .badge-currier { background: #dbeafe; color: #1d4ed8; }
  .badge-nocurrier { background: #dcfce7; color: #15803d; }
  .badge-ambos { background: #fef3c7; color: #92400e; }
  .badge-b2c { background: #ede9fe; color: #6d28d9; }
  .badge-custom { background: #f3e8ff; color: #7e22ce; }
  .group-label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 8px; }
  .case-block { background: white; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; touch-action: manipulation; }
  .case-block:hover { border-color: #ff6900; box-shadow: 0 0 0 2px #ff690022; }
  .case-text { font-size: 13px; color: #333; font-family: monospace; line-height: 1.6; word-break: break-word; }
  .copy-tag { position: absolute; top: 8px; right: 10px; font-size: 11px; color: #bbb; opacity: 0; transition: opacity 0.15s; }
  .case-block:hover .copy-tag { opacity: 1; }
  .copied-msg { position: absolute; top: 8px; right: 10px; font-size: 11px; color: #15803d; font-weight: 600; display: none; }
  .case-notes-area { margin-top: 8px; border-top: 1px dashed #e5e7eb; padding-top: 8px; display: none; }
  .case-block.has-notes .case-notes-area { display: block; }
  .case-note-item { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: 12px; color: #92400e; display: flex; align-items: flex-start; gap: 6px; }
  .case-note-text { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .case-note-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-note-edit, .btn-note-del { font-size: 10px; border: none; background: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.1s; }
  .btn-note-edit { color: #2563eb; }
  .btn-note-edit:hover { background: #dbeafe; }
  .btn-note-del { color: #dc2626; }
  .btn-note-del:hover { background: #fee2e2; }
  .btn-add-case-note { font-size: 11px; margin-top: 4px; padding: 3px 8px; border: 1px dashed #d97706; border-radius: 6px; background: none; color: #b45309; cursor: pointer; transition: background 0.1s; }
  .btn-add-case-note:hover { background: #fef3c7; }
  .case-note-add-bar { display: none; margin-top: 5px; }
  .case-note-add-bar.visible { display: flex; gap: 5px; flex-wrap: wrap; }
  .case-note-input { flex: 1; min-width: 120px; font-size: 12px; padding: 4px 8px; border: 1px solid #d97706; border-radius: 6px; outline: none; font-family: Arial, sans-serif; }
  .btn-note-save, .btn-note-cancel { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: none; }
  .btn-note-save { background: #d97706; color: white; }
  .btn-note-save:hover { background: #b45309; }
  .btn-note-cancel { background: #f3f4f6; color: #555; }
  .btn-note-cancel:hover { background: #e5e7eb; }
  .info-note { background: #fff8f0; border: 1.5px solid #ffcfa0; border-left: 4px solid #ff6900; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #555; line-height: 1.6; }
  .info-note strong { color: #c2440a; display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .info-note p { margin-bottom: 6px; white-space: pre-line; }
  .flow-guide { background: #ffffff; border: 1.5px solid #d1fae5; border-left: 5px solid #10b981; border-radius: 10px; padding: 12px 14px; margin: 12px 0 16px; box-shadow: 0 2px 8px #00000008; }
  .flow-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .flow-title { font-size: 13px; font-weight: 800; color: #047857; text-transform: uppercase; letter-spacing: .04em; }
  .flow-pill { font-size: 11px; font-weight: 700; color: #065f46; background: #d1fae5; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
  .btn-edit-flow { font-size: 11px; padding: 3px 9px; border: 1px solid #6ee7b7; border-radius: 999px; background: white; color: #047857; cursor: pointer; transition: background 0.1s; white-space: nowrap; }
  .btn-edit-flow:hover { background: #d1fae5; }
  .flow-steps { display: grid; gap: 7px; }
  .flow-step { display: grid; grid-template-columns: 24px 1fr; gap: 8px; align-items: start; font-size: 12.5px; line-height: 1.45; color: #374151; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; }
  .flow-num { width: 22px; height: 22px; border-radius: 50%; background: #ff6900; color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }
  .flow-step strong { color: #111827; }
  .flow-editor { display: none; margin-top: 10px; }
  .flow-editor.visible { display: block; }
  .flow-step-edit { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; }
  .flow-step-edit textarea { flex: 1; font-size: 12px; padding: 5px 8px; border: 1px solid #6ee7b7; border-radius: 6px; resize: vertical; min-height: 38px; font-family: Arial, sans-serif; outline: none; }
  .flow-step-edit textarea:focus { border-color: #10b981; }
  .btn-del-step { font-size: 11px; padding: 4px 8px; border: 1px solid #fca5a5; border-radius: 6px; background: #fff5f5; color: #dc2626; cursor: pointer; flex-shrink: 0; }
  .btn-del-step:hover { background: #fee2e2; }
  .btn-add-step { font-size: 11px; padding: 5px 12px; border: 1px dashed #6ee7b7; border-radius: 6px; background: #f0fdf4; color: #065f46; cursor: pointer; margin-top: 4px; }
  .btn-add-step:hover { background: #d1fae5; }
  .flow-editor-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn-save-flow { font-size: 12px; padding: 6px 14px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .btn-save-flow:hover { background: #059669; }
  .btn-cancel-flow { font-size: 12px; padding: 6px 14px; background: #f3f4f6; color: #555; border: none; border-radius: 6px; cursor: pointer; }
  .btn-cancel-flow:hover { background: #e5e7eb; }
  .case-edit-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .btn-case-edit { font-size: 11px; padding: 5px 12px; border: 1.5px solid #aaa; border-radius: 20px; background: white; color: #555; cursor: pointer; transition: all 0.15s; }
  .btn-case-edit:hover { border-color: #ff6900; color: #ff6900; }
  .btn-case-edit.on { background: #fff3e0; border-color: #ff6900; color: #c2410c; font-weight: 700; }
  .btn-case-reset { font-size: 11px; padding: 5px 12px; border: 1.5px solid #ddd; border-radius: 20px; background: white; color: #888; cursor: pointer; display: none; transition: all 0.15s; }
  .btn-case-reset.visible { display: inline-block; }
  .btn-case-reset:hover { border-color: #e11d48; color: #e11d48; }
  .btn-add-case { font-size: 11px; padding: 5px 12px; border: 1.5px solid #10b981; border-radius: 20px; background: #f0fdf4; color: #065f46; cursor: pointer; transition: all 0.15s; font-weight: 600; }
  .btn-add-case:hover { background: #d1fae5; }
  .btn-del-section { font-size: 11px; padding: 5px 12px; border: 1.5px solid #fca5a5; border-radius: 20px; background: #fff5f5; color: #dc2626; cursor: pointer; transition: all 0.15s; display: none; }
  .btn-del-section.visible { display: inline-block; }
  .btn-del-section:hover { background: #fee2e2; border-color: #dc2626; }
  .case-edit-hint { font-size: 11px; color: #aaa; display: none; }
  .case-edit-hint.visible { display: inline; }
  .section.case-edit-mode .case-block { cursor: grab; border-style: dashed; border-color: #d1d5db; user-select: none; -webkit-user-select: none; }
  .section.case-edit-mode .case-block:active { cursor: grabbing; }
  .case-block.case-dragging { opacity: 0.3; transform: scale(0.97); }
  .case-block.case-drag-over { border-color: #ff6900 !important; background: #fff3e0 !important; transform: scale(1.02); box-shadow: 0 0 0 2px #ff690044; border-style: solid !important; }
  .case-block-actions { display: none; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .section.case-edit-mode .case-block-actions { display: flex; }
  .btn-case-del { font-size: 10px; padding: 3px 8px; border: 1px solid #fca5a5; border-radius: 6px; background: #fff5f5; color: #dc2626; cursor: pointer; }
  .btn-case-del:hover { background: #fee2e2; }
  .btn-case-edit-text { font-size: 10px; padding: 3px 8px; border: 1px solid #93c5fd; border-radius: 6px; background: #eff6ff; color: #1d4ed8; cursor: pointer; }
  .btn-case-edit-text:hover { background: #dbeafe; }
  .add-case-form { background: #f0fdf4; border: 1.5px solid #6ee7b7; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: none; }
  .add-case-form.visible { display: block; }
  .add-case-form label { font-size: 12px; font-weight: 600; color: #065f46; display: block; margin-bottom: 5px; }
  .add-case-form textarea { width: 100%; font-size: 12px; font-family: monospace; padding: 7px 10px; border: 1px solid #6ee7b7; border-radius: 6px; resize: vertical; min-height: 60px; outline: none; }
  .add-case-form-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .btn-save-case { font-size: 12px; padding: 5px 14px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; }
  .btn-save-case:hover { background: #059669; }
  .btn-cancel-case { font-size: 12px; padding: 5px 14px; background: #f3f4f6; color: #555; border: none; border-radius: 6px; cursor: pointer; }
  .btn-cancel-case:hover { background: #e5e7eb; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: #00000066; z-index: 9998; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.visible { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 20px 22px; max-width: 560px; width: 100%; box-shadow: 0 10px 40px #0003; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 14px; }
  .modal label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select { width: 100%; font-size: 13px; padding: 8px 10px; border: 1.5px solid #d1d5db; border-radius: 8px; outline: none; font-family: Arial, sans-serif; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #ff6900; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; flex-wrap: wrap; }
  .btn-modal-save { padding: 8px 18px; background: #ff6900; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-modal-save:hover { background: #ea580c; }
  .btn-modal-cancel { padding: 8px 18px; background: #f3f4f6; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .btn-modal-cancel:hover { background: #e5e7eb; }
  .btn-edit-section { font-size:11px; padding:5px 12px; border:1.5px solid #93c5fd; border-radius:20px; background:#eff6ff; color:#1d4ed8; cursor:pointer; transition: all 0.15s; }
  .btn-edit-section:hover { background: #dbeafe; }
  .section-action-bar { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
</style>
</head>
<body>

<!-- Modal agregar/editar sección -->
<div class="modal-overlay" id="modalSection">
  <div class="modal">
    <div class="modal-title" id="modalSectionTitle">➕ Agregar nuevo caso</div>
    <label>Nombre del botón / sección</label>
    <input type="text" id="modalSectionLabel" placeholder="Ej: Pedido bloqueado por sistema">
    <label>Tipo</label>
    <select id="modalSectionBadge">
      <option value="nocurrier">No currier</option>
      <option value="currier">Currier</option>
      <option value="ambos">Currier & No currier</option>
      <option value="b2c">B2C</option>
      <option value="custom">Personalizado</option>
    </select>
    <label>Nota especial (opcional)</label>
    <textarea id="modalSectionNotas" placeholder="Agregar nota que aparece arriba de los casos..."></textarea>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="btnModalSectionCancel">Cancelar</button>
      <button class="btn-modal-save" id="btnModalSectionSave">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal editar texto de caso -->
<div class="modal-overlay" id="modalCaseEdit">
  <div class="modal">
    <div class="modal-title">✏️ Editar caso</div>
    <label>Texto del caso</label>
    <textarea id="modalCaseText" rows="4" placeholder="xxx//rider indica...//RS"></textarea>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="btnModalCaseCancel">Cancelar</button>
      <button class="btn-modal-save" id="btnModalCaseSave">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal editar nota -->
<div class="modal-overlay" id="modalNoteEdit">
  <div class="modal">
    <div class="modal-title">📝 Editar nota</div>
    <label>Texto de la nota</label>
    <textarea id="modalNoteText" rows="3" placeholder="Tu nota personal..."></textarea>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="btnModalNoteCancel">Cancelar</button>
      <button class="btn-modal-save" id="btnModalNoteSave">Guardar</button>
    </div>
  </div>
</div>

<header>
  <h1>📦 Guía de Casos Peya</h1>
</header>

<div class="container">
  <div class="edit-bar">
    <button class="btn-edit-mode" id="btnEditMode">✏️ Reordenar botones</button>
    <button class="btn-add-nav" id="btnAddNav">＋ Nuevo caso</button>
    <span class="edit-hint" id="editHint">Arrastrá o mantenés presionado para mover · El orden se guarda automáticamente</span>
    <button class="btn-reset-order" id="btnReset">↺ Restablecer orden</button>
  </div>
  <div class="nav" id="nav"></div>
  <div id="content"></div>
</div>

<script>
const categoriasBase = [
  { id: "gran-tamaño", label: "Orden de gran tamaño", badge: "ambos", grupos: [
    { label: "No currier", items: [
      "xxx//rider indica pedido de gran tamaño//vehículo del rider motocicleta//tiene más de 4 ítems//divido el pedido//informo al rider//RS",
      "xxx//rider indica pedido de gran tamaño//vehículo del rider motocicleta//tiene otros pedidos levantados//divido el pedido//informo al rider//RS",
      "//pedido de gran tamaño//vehículo del rider motocicleta//excede el peso necesario//divido el pedido//RS",
      "//pedido de gran tamaño//rider no quiere seguir//envío solución//RS",
      "xxx//rider indica pedido de gran tamaño//vehículo del rider es auto//envió solución \"DimensionesOk\"//no divido el pedido//RS",
      "xxx//orden de gran tamaño//menos de 4 ítems//envió solución \"DimensionesOk\"//no divido//RS",
      "// indica pedido de gran tamaño // no es auto // tiene más de 4 productos // divido pedido // informo al rider // RS",
      "// indica pedido de gran tamaño // no es auto // tiene más de 4 productos // NO quiere dividir el pedido // envío solución // informo al rider // RS",
      "//rider indica pedido de gran tamaño//valido que el volumen amerita otro rider//divido la pedido por Big order/split order//RS",
      "//rider indica pedido de gran tamaño//verifico ya no está en el local//informo//no divido//RS",
    ]},
    { label: "Currier", items: [
      "xxx//pedido de gran tamaño//rider near pickup//currier//no es contacto de otro rider//no tiene otros pedidos levantados//envió solución \"TamañoOK\"//RS",
      "xxx//pedido de gran tamaño//rider near pickup//currier//no es contacto de otro rider//tiene otros pedidos levantados//reasigno pedido//RS",
      "//pedido de gran tamaño//currier//segundo contacto//rechazo el pedido//RS",
      "//pedido de gran tamaño//currier//no es recontacto//tiene otro pedido levantado//reasigno//RS",
    ]},
  ]},

  { id: "espera-rider", label: "Consulta por compañero de entrega en órdenes divididas", badge: "nocurrier", grupos: [
    { label: "", items: [
      "xxx//consulta por el otro rider//rider indica que puede llevarse el pedido solo//el otro rider no está near pickup//procedo a quitar el pedido del otro rider//RS",
      "xxx//consulta por el otro rider//rider indica que puede llevar el pedido solo//el otro rider near pickup//solicito que aguarde al otro rider//RS",
      "//indica que puede llevarse solo el pedido//el otro rider en near pickup//informo que no se puede//RS",
      "xxx//consulta por el otro rider//solicita ser primario//el otro rider no está near pickup//acciono//RS",
      "xxx//rider solicita ser secundario//acciono//RS",
    ]},
  ]},

  { id: "prod-no-disp", label: "Producto no disponible", badge: "nocurrier", notas: "<strong>Comentario Especial:</strong> Cuando no se puede gestionar porque el local no puede cancelar el pedido por falta de producto:\n\n<i>\"Entiendo lo que me comentas y comprendo la molestia que presentas. De igual forma, quiero recordarte que en las situaciones en que nosotros no podamos reasignar un pedido por el motivo presentado, tendrás la posibilidad de realizarlo desde tu aplicación, siguiendo los pasos que fueron compartidos anteriormente; lamento no poder darte otra respuesta.\"</i>", grupos: [
    { label: "No currier", items: [
      "xxx//rider en near pickup//rider indica producto faltante//local no preparará el pedido//envió solución \"/On_PU_Soporte\"//RS",
      "xxx//rider en near pickup//rider indica faltante de producto//local preparará el pedido//envió solución \"/On_PU_FaltanteEnvío\"//RS",
      "xxx//rider no está en near pickup//indica faltante de producto//indico que se dirija al pickup//RS",
      "//Rider indica producto no disponible//Partner no preparará el pedido//Envío solución/On_PU_Soporte//RS",
    ]},

const STORAGE_KEY     = "peya_btn_order";
const CASE_PREFIX     = "peya_cases_";
const FLOW_PREFIX     = "peya_flow_";
const CUSTOM_CATS_KEY = "peya_custom_cats";
const CUSTOM_ITEMS_KEY= "peya_custom_items_";
const CASE_NOTES_KEY  = "peya_notes_";

function loadCustomCats(){try{return JSON.parse(localStorage.getItem(CUSTOM_CATS_KEY))||[];}catch(e){return[];}}
function saveCustomCats(a){localStorage.setItem(CUSTOM_CATS_KEY,JSON.stringify(a));}
function loadCustomItems(id){try{return JSON.parse(localStorage.getItem(CUSTOM_ITEMS_KEY+id))||null;}catch(e){return null;}}
function saveCustomItems(id,items){localStorage.setItem(CUSTOM_ITEMS_KEY+id,JSON.stringify(items));}
function loadFlow(id){try{return JSON.parse(localStorage.getItem(FLOW_PREFIX+id));}catch(e){return null;}}
function saveFlow(id,steps){localStorage.setItem(FLOW_PREFIX+id,JSON.stringify(steps));}
function loadNotes(k){try{return JSON.parse(localStorage.getItem(CASE_NOTES_KEY+k))||[];}catch(e){return[];}}
function saveNotes(k,n){localStorage.setItem(CASE_NOTES_KEY+k,JSON.stringify(n));}
function getCaseKey(secId,text){return secId+"_"+btoa(unescape(encodeURIComponent(text.substring(0,40)))).replace(/[^a-zA-Z0-9]/g,"").substring(0,20);}
function escHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(t){return t.replace(/"/g,"&quot;");}

function buildFlowHtml(secId, steps){
  if(!steps||!steps.length) return "";
  return `<div class="flow-guide" id="flow-${secId}">
    <div class="flow-head">
      <div class="flow-title">Paso a paso general del flujo</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <div class="flow-pill">No currier / según caso</div>
        <button class="btn-edit-flow" data-sec="${secId}">✏️ Editar pasos</button>
      </div>
    </div>
    <div class="flow-steps" id="flow-steps-${secId}">${steps.map((p,i)=>`<div class="flow-step"><span class="flow-num">${i+1}</span><div>${p}</div></div>`).join("")}</div>
    <div class="flow-editor" id="flow-editor-${secId}">
      <div id="flow-inputs-${secId}">${steps.map((p,i)=>`<div class="flow-step-edit"><textarea data-idx="${i}">${p.replace(/<[^>]+>/g,"")}</textarea><button class="btn-del-step" data-idx="${i}">✕</button></div>`).join("")}</div>
      <button class="btn-add-step" data-sec="${secId}">＋ Agregar paso</button>
      <div class="flow-editor-actions">
        <button class="btn-save-flow" data-sec="${secId}">✅ Guardar pasos</button>
        <button class="btn-cancel-flow" data-sec="${secId}">Cancelar</button>
      </div>
    </div>
  </div>`;
}

function buildCaseBlockHtml(secId, item){
  const key = getCaseKey(secId, item);
  const notes = loadNotes(key);
  const notesHtml = notes.map((n,i)=>`
    <div class="case-note-item" data-ni="${i}">

function buildCasesHtml(secId, grupos, customItemsOverride){
  let html=`<div class="case-edit-bar">
    <button class="btn-case-edit" data-sec="${secId}">✏️ Reordenar casos</button>
    <button class="btn-add-case" data-sec="${secId}">＋ Agregar caso</button>
    <span class="case-edit-hint">Arrastrá para reordenar · Se guarda automáticamente</span>
    <button class="btn-case-reset" data-sec="${secId}">↺ Restablecer orden</button>
  </div>
  <div class="add-case-form" id="add-case-form-${secId}">
    <label>Texto del nuevo caso (autocopiable):</label>
    <textarea id="add-case-input-${secId}" placeholder="xxx//rider indica...//RS"></textarea>
    <div class="add-case-form-actions">
      <button class="btn-save-case" data-sec="${secId}">Agregar</button>
      <button class="btn-cancel-case" data-sec="${secId}">Cancelar</button>
    </div>
  </div>
  <div class="cases-container" id="cases-${secId}">`;
  if(customItemsOverride){
    customItemsOverride.forEach(item=>{html+=buildCaseBlockHtml(secId,item);});
  } else {
    grupos.forEach(g=>{
      if(g.label) html+=`<div class="group-label" data-group="${g.label}">${g.label}</div>`;
      g.items.forEach(item=>{html+=buildCaseBlockHtml(secId,item);});
    });
  }
  html+=`</div>`;
  return html;
}

function buildSection(cat){
  const savedFlow = loadFlow(cat.id);
  const baseFlow = pasosFlujo[cat.id];
  const activeFlow = savedFlow||baseFlow;
  const customItems = loadCustomItems(cat.id);
  const isCustom = !categoriasBase.find(c=>c.id===cat.id);
  let html=`<div class="section-title">${cat.label}</div>`;
  html+=`<span class="badge badge-${cat.badge}">${badgeLabels[cat.badge]||cat.badge}</span>`;
  html+=`<div class="section-action-bar">
    <button class="btn-edit-section" data-sec="${cat.id}">✏️ Editar sección</button>
    <button class="btn-del-section${isCustom?" visible":""}" data-sec="${cat.id}">🗑️ Eliminar sección</button>
  </div>`;
  if(cat.notas) html+=`<div class="info-note">${cat.notas}</div>`;
  if(activeFlow) html+=buildFlowHtml(cat.id, activeFlow);
  html+=buildCasesHtml(cat.id, cat.grupos, customItems);
  return html;
}

  }
  // Cancel flow

    const secId=cancelFlowBtn.dataset.sec;

    const steps=loadFlow(secId)||pasosFlujo[secId]||[];

  const saveCaseBtn=e.target.closest(".btn-save-case");
  if(saveCaseBtn){const secId=saveCaseBtn.dataset.sec;const input=document.getElementById("add-case-input-"+secId);const text=input.value.trim();if(!text){alert("Ingresá el texto del caso.");return;}addCaseToSection(secId,text);input.value="";document.getElementById("add-case-form-"+secId).classList.remove("visible");return;}

  // Edit case text
  const editCaseTextBtn=e.target.closest(".btn-case-edit-text");

  // Add note

  if(addNoteBtn){e.stopPropagation();const key=addNoteBtn.dataset.key;const bar=document.getElementById("note-bar-"+key);if(bar){bar.classList.toggle("visible");if(bar.classList.contains("visible"))document.getElementById("note-input-"+key).focus();}return;}
  // Save note
  const saveNoteBtn=e.target.closest(".btn-note-save");
  if(saveNoteBtn){e.stopPropagation();const key=saveNoteBtn.dataset.key;const input=document.getElementById("note-input-"+key);const text=input.value.trim();if(!text)return;const notes=loadNotes(key);notes.push(text);saveNotes(key,notes);input.value="";const bar=document.getElementById("note-bar-"+key);if(bar)bar.classList.remove("visible");refreshNotesArea(key,notes);return;}
  // Cancel note
  const cancelNoteBtn=e.target.closest(".btn-note-cancel");
  if(cancelNoteBtn){e.stopPropagation();const bar=document.getElementById("note-bar-"+cancelNoteBtn.dataset.key);if(bar)bar.classList.remove("visible");return;}
  // Edit note
  const editNoteBtn=e.target.closest(".btn-note-edit");
  if(editNoteBtn){e.stopPropagation();pendingNoteEdit={key:editNoteBtn.dataset.key,ni:parseInt(editNoteBtn.dataset.ni)};document.getElementById("modalNoteText").value=loadNotes(pendingNoteEdit.key)[pendingNoteEdit.ni]||"";document.getElementById("modalNoteEdit").classList.add("visible");return;}
  // Delete note

  if(delNoteBtn){e.stopPropagation();const key=delNoteBtn.dataset.key;const ni=parseInt(delNoteBtn.dataset.ni);const notes=loadNotes(key);notes.splice(ni,1);saveNotes(key,notes);refreshNotesArea(key,notes);return;}
  // Copy case
  const block=e.target.closest(".case-block");
  if(block){
    const sec=block.closest(".section");if(sec&&sec.classList.contains("case-edit-mode"))return;
    if(e.target.closest(".case-notes-area")||e.target.closest(".case-block-actions"))return;
    navigator.clipboard.writeText(block.dataset.text).then(()=>{const msg=block.querySelector(".copied-msg");msg.style.display="block";setTimeout(()=>{msg.style.display="none";},1500);});
  }
});

  sec.classList.toggle("case-edit-mode",on);
  const btn=sec.querySelector(".btn-case-edit");const hint=sec.querySelector(".case-edit-hint");const rb=sec.querySelector(".btn-case-reset");

<style>
  .nav button.herocare-suggested {
    animation: heroPulse 1.5s ease-in-out 3;
    box-shadow: 0 0 0 3px #ff6900, 0 0 16px #ff690066;
    border-color: #ff6900 !important;
    color: #ff6900 !important;
    background: #fff3e0 !important;
    font-weight: 700 !important;
  }
  @keyframes heroPulse {
    0%, 100% { box-shadow: 0 0 0 3px #ff6900, 0 0 16px #ff690066; }
    50%       { box-shadow: 0 0 0 6px #ff6900, 0 0 28px #ff690099; }
  }
  .nav button.herocare-active-suggest {
    box-shadow: 0 0 0 3px #ff6900;
    border-color: #ff6900 !important;
    background: #fff3e0 !important;
    font-weight: 700 !important;
  }
  #herocare-banner {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; z-index: 9997;
    background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%);
    color: white; padding: 10px 20px;
    font-family: Arial, sans-serif; font-size: 13px;
    border-bottom: 3px solid #ff6900;
    align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #herocare-banner.visible { display: flex; }
  .hc-label { font-size: 10px; color: #ff6900; font-weight: 700; text-transform: uppercase; letter-spacing:.06em; white-space:nowrap; }
  .hc-case { font-weight: 700; font-size: 14px; white-space: nowrap; }
  .hc-reason { font-size: 12px; color: #aaa; flex: 1; }
  .hc-confidence { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .hc-btn-goto {
    background: #ff6900; color: white; border: none; border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: background 0.15s;
  }
  .hc-btn-goto:hover { background: #ea580c; }
  .hc-btn-close {
    background: none; border: none; color: #666; font-size: 18px;
    cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .hc-btn-close:hover { color: white; }
  body.has-hc-banner .container { margin-top: 48px; }
</style>

<div id="herocare-banner">
  <div class="hc-label">🤖 HeroCare sugiere</div>
  <div class="hc-case" id="hc-case-name">—</div>
  <div class="hc-reason" id="hc-reason">—</div>
  <div class="hc-confidence" id="hc-confidence"></div>
  <button class="hc-btn-goto" id="hc-btn-goto">Ver caso →</button>
  <button class="hc-btn-close" id="hc-btn-close">×</button>
</div>

<script>
(function() {
  const CHANNEL_NAME = "herocare_peya_channel";
  const channel = new BroadcastChannel(CHANNEL_NAME);

  let currentSuggestedId = null;

  function highlightButton(caseId) {
    document.querySelectorAll(".nav button.herocare-suggested, .nav button.herocare-active-suggest")
      .forEach(b => b.classList.remove("herocare-suggested", "herocare-active-suggest"));

    const btn = document.querySelector(`.nav button[data-id="${caseId}"]`);
    if (!btn) {
      console.warn("[Peya] Botón no encontrado para caseId:", caseId);
      return false;
    }

    btn.classList.add("herocare-suggested");

    setTimeout(() => {
      btn.classList.remove("herocare-suggested");
      btn.classList.add("herocare-active-suggest");
    }, 4500);

    btn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
    return true;
  }

  function showBanner(caseId, confidence, reason, contactReason) {
    const banner = document.getElementById("herocare-banner");
    const caseName = caseId.replace(/-/g, " ").replace(/\b\w/g, l => l.toUpperCase());
    const confColor = confidence >= 80 ? "#10b981" : confidence >= 60 ? "#f59e0b" : "#ef4444";

    document.getElementById("hc-case-name").textContent = caseName;
    document.getElementById("hc-reason").textContent = reason || contactReason || "";
    document.getElementById("hc-confidence").innerHTML =
      `<span style="color:${confColor}">●</span> ${confidence}%`;

    banner.classList.add("visible");
    document.body.classList.add("has-hc-banner");
    currentSuggestedId = caseId;
  }

  function hideBanner() {
    document.getElementById("herocare-banner").classList.remove("visible");
    document.body.classList.remove("has-hc-banner");
    document.querySelectorAll(".nav button.herocare-suggested, .nav button.herocare-active-suggest")
      .forEach(b => b.classList.remove("herocare-suggested", "herocare-active-suggest"));
  }

  channel.onmessage = (e) => {
    if (e.data.type !== "HEROCARE_SUGGESTION") return;
    const { caseId, confidence, reason, contactReason } = e.data;

    console.log("[Peya] Sugerencia recibida:", caseId, confidence + "%");

    showBanner(caseId, confidence, reason, contactReason);
    highlightButton(caseId);
  };

  window.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const caseParam = params.get("case");
    if (caseParam) {
      setTimeout(() => {
        highlightButton(caseParam);
        showBanner(caseParam, 100, "Abierto desde HeroCare", "");
        const btn = document.querySelector(`.nav button[data-id="${caseParam}"]`);
        if (btn) btn.click();
      }, 500);
    }
  });

  document.getElementById("hc-btn-goto").addEventListener("click", () => {
    if (currentSuggestedId) {
      const btn = document.querySelector(`.nav button[data-id="${currentSuggestedId}"]`);
      if (btn) btn.click();
    }
  });

  document.getElementById("hc-btn-close").addEventListener("click", hideBanner);

  console.log("[Peya] Integración HeroCare lista, escuchando canal:", CHANNEL_NAME);
})();
</script>

</body>
